<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mubeen's Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { brand: { purple: '#667eea', violet: '#764ba2', gold: '#ffd700', goldDark: '#ffad42' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-glass { background: rgba(255,255,255,0.09); box-shadow: 0 10px 32px rgba(0,0,0,0.08), 0 1.5px 4px rgba(255,255,255,0.17); }
        .link-underline { position: relative; }
        .link-underline::after { content: ''; position: absolute; left: 0; bottom: -2px; width: 0; height: 2px; background: #fff; transition: width 0.3s; }
        .link-underline:hover::after { width: 100%; }
        input:focus { outline: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col text-white">
    <nav class="flex flex-wrap justify-between items-center px-6 md:px-12 lg:px-16 pt-8 pb-4">
        <a href="/" class="text-white font-extrabold text-xl md:text-2xl tracking-wide">Mubeen's Home</a>
        <div class="flex gap-6 md:gap-8">
            <a href="/" class="text-white/90 hover:text-amber-300 font-semibold text-sm md:text-base link-underline">Home</a>
            <a href="/features/" class="text-white/90 hover:text-amber-300 font-semibold text-sm md:text-base link-underline">Features</a>
            <a href="/contact/" class="text-white/90 hover:text-amber-300 font-semibold text-sm md:text-base link-underline">Contact</a>
            <a href="/login/" class="text-amber-300 font-semibold text-sm md:text-base link-underline">Login</a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="card-glass rounded-2xl p-8 md:p-10">
                <div class="text-center mb-8">
                    <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight mb-2">Sign in</h1>
                    <p class="text-white/70 text-sm md:text-base">Enter your credentials to access your account.</p>
                </div>

                <form action="#" method="post" class="space-y-5">
                    {% csrf_token %}
                    <div>
                        <label for="username" class="block text-sm font-semibold mb-2 text-white/90">Email or username</label>
                        <input type="text" id="username" name="username" required autocomplete="username"
                            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:border-amber-300/60 focus:ring-2 focus:ring-amber-300/30 transition"
                            placeholder="you@example.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-semibold mb-2 text-white/90">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:border-amber-300/60 focus:ring-2 focus:ring-amber-300/30 transition"
                            placeholder="••••••••">
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 cursor-pointer text-white/80 hover:text-white">
                            <input type="checkbox" name="remember" class="rounded border-white/30 bg-white/10 text-amber-400 focus:ring-amber-300/50">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="text-amber-300 hover:text-amber-200 font-medium">Forgot password?</a>
                    </div>
                    <button type="submit"
                        class="w-full py-3.5 rounded-full font-bold text-gray-900 bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-500 hover:to-amber-400 shadow-lg hover:shadow-xl transition-all">
                        Sign in
                    </button>
                </form>

                <p class="mt-6 text-center text-white/70 text-sm">
                    Don't have an account?
                    <a href="#" class="text-amber-300 hover:text-amber-200 font-semibold ml-1">Sign up</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="text-center text-white/70 py-6 text-sm md:text-base tracking-wide">
        &copy; 2024 Mubeen Mehmood. All rights reserved.
    </footer>
</body>
</html>
