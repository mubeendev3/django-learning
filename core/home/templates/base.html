<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
              content="Mubeen's Home - Welcome, Features, Contact and Login.">
        <meta name="keywords" content="home, features, contact, login">
        <title>
            {% block title %}
                Mubeen's Home
            {% endblock title %}
        </title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
              rel="stylesheet">
        <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { brand: { purple: '#667eea', violet: '#764ba2', gold: '#ffd700', goldDark: '#ffad42' } }
                }
            }
        }
        </script>
        <style>
        body { font-family: 'Montserrat', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-glass { background: rgba(255,255,255,0.09); box-shadow: 0 10px 32px rgba(0,0,0,0.08), 0 1.5px 4px rgba(255,255,255,0.17); }
        .link-underline { position: relative; }
        .link-underline::after { content: ''; position: absolute; left: 0; bottom: -2px; width: 0; height: 2px; background: #fff; transition: width 0.3s; }
        .link-underline:hover::after { width: 100%; }
        input:focus, textarea:focus { outline: none; }
        </style>
        {% block extra_head %}
        {% endblock extra_head %}
    </head>
    <body class="gradient-bg min-h-screen flex flex-col text-white">
        <nav class="flex flex-wrap justify-between items-center px-6 md:px-12 lg:px-16 pt-8 pb-4">
            <a href="{% url 'home' %}"
               class="text-white font-extrabold text-xl md:text-2xl tracking-wide">Mubeen's Home</a>
            <div class="flex gap-6 md:gap-8">
                <a href="{% url 'home' %}"
                   class="{% if request.path == '/' %}text-amber-300{% else %}text-white/90 hover:text-amber-300{% endif %} font-semibold text-sm md:text-base link-underline">Home</a>
                <a href="{% url 'features' %}"
                   class="{% if request.path == '/features/' %}text-amber-300{% else %}text-white/90 hover:text-amber-300{% endif %} font-semibold text-sm md:text-base link-underline">Features</a>
                <a href="{% url 'contact' %}"
                   class="{% if request.path == '/contact/' %}text-amber-300{% else %}text-white/90 hover:text-amber-300{% endif %} font-semibold text-sm md:text-base link-underline">Contact</a>
                <a href="{% url 'login' %}"
                   class="{% if request.path == '/login/' %}text-amber-300{% else %}text-white/90 hover:text-amber-300{% endif %} font-semibold text-sm md:text-base link-underline">Login</a>
                <a href="{% url 'recipe' %}"
                   class="{% if request.path == '/recipe/' %}text-amber-300{% else %}text-white/90 hover:text-amber-300{% endif %} font-semibold text-sm md:text-base link-underline">Recipe</a>
            </div>
        </nav>
        <main class="flex-1">
            {% block content %}
            {% endblock content %}
        </main>
        <footer class="text-center text-white/70 py-6 text-sm md:text-base tracking-wide">
            © 2024 Mubeen Mehmood. All rights reserved.
        </footer>
        {% block extra_js %}
        {% endblock extra_js %}
    </body>
</html>
